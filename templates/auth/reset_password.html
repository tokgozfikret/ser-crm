{% extends "base.html" %}
{% block title %}Yeni Şifre Belirle - SER-CRM{% endblock %}
{% block content %}
<div class="login-page">
    <div class="login-box">
        <h1>SER-CRM © 2026</h1>
        <h2 class="form-section-title" style="font-size:1rem; margin-bottom:1rem;">Yeni şifre belirleyin</h2>
        <form method="post" action="{{ url_for('auth.reset_password', token=token) }}" class="login-form form-modern">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="password">Yeni şifre</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>
            <div class="form-group">
                <label for="password2">Yeni şifre (tekrar)</label>
                <input type="password" id="password2" name="password2" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Şifreyi güncelle</button>
        </form>
        <a href="{{ url_for('auth.login') }}" class="btn btn-outline btn-block" style="margin-top:0.75rem;">Giriş sayfasına dön</a>
    </div>
</div>
{% endblock %}
