{% extends "base.html" %}
{% block title %}Şifremi Unuttum - SER-CRM{% endblock %}
{% block content %}
<div class="login-page">
    <div class="login-box">
        <h1>SER-CRM © 2026</h1>
        <h2 class="form-section-title" style="font-size:1rem; margin-bottom:1rem;">Şifre sıfırlama</h2>
        <p class="text-muted" style="font-size:0.9rem; margin-bottom:1rem;">
            Kayıtlı e-posta adresinizi girin. Size şifre sıfırlama bağlantısı göndereceğiz.
        </p>
        <form method="post" action="{{ url_for('auth.forgot_password') }}" class="login-form form-modern">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="email">E-posta adresi</label>
                <input type="email" id="email" name="email" required autofocus placeholder="ornek@firma.com">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Bağlantı gönder</button>
        </form>
        <a href="{{ url_for('auth.login') }}" class="btn btn-outline btn-block" style="margin-top:0.75rem;">Giriş sayfasına dön</a>
    </div>
</div>
{% endblock %}
